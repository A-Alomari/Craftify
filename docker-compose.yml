version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: craftify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: craftify
      POSTGRES_USER: craftify
      POSTGRES_PASSWORD: craftify
    ports:
      - "5432:5432"
    volumes:
      - craftify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craftify -d craftify"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  craftify-postgres-data:
