<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Craftify</title>
  <link rel="stylesheet" href="../../assets/styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@400;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
  <header class="bg-surface-container-lowest border-b border-outline-variant/10">
    <nav class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
      <a href="../home/index.html" class="text-2xl font-headline font-bold text-primary">Craftify</a>
      <div class="flex items-center gap-2">
        <button class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-all">
          <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
        </button>
        <a href="./faq.html" class="px-4 py-2 rounded-lg border border-outline-variant/30 text-sm font-semibold hover:bg-surface-container-low transition-all">Help Center</a>
      </div>
    </nav>
  </header>

  <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
    <header class="mb-10 text-center">
      <h1 class="font-headline text-4xl md:text-5xl font-bold">Contact Support</h1>
      <p class="mt-3 text-on-surface-variant">Send your question and our team will reply within 24 hours.</p>
    </header>

    <section class="bg-surface-container-lowest border border-outline-variant/15 rounded-2xl p-6 md:p-8 shadow-sm">
      <form id="contact-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <label class="block">
            <span class="text-sm font-semibold text-on-surface-variant block mb-2">Full Name</span>
            <input id="contact-name-input" type="text" class="w-full bg-surface-container-low rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary" placeholder="Your full name" required />
          </label>
          <label class="block">
            <span class="text-sm font-semibold text-on-surface-variant block mb-2">Email</span>
            <input id="contact-email-input" type="email" class="w-full bg-surface-container-low rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary" placeholder="you@example.com" required />
          </label>
        </div>

        <label class="block">
          <span class="text-sm font-semibold text-on-surface-variant block mb-2">Message</span>
          <textarea id="contact-message-input" rows="7" class="w-full bg-surface-container-low rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary" placeholder="Describe your issue or question" required></textarea>
        </label>

        <div class="flex justify-end">
          <button id="contact-submit-btn" type="submit" class="px-6 py-3 rounded-xl bg-primary-container text-on-primary-container font-bold hover:brightness-105 transition-all">Send Message</button>
        </div>
      </form>
    </section>
  </main>

  <script src="../../assets/shop.js"></script>
</body>
</html>
