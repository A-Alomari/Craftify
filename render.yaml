services:
  - type: web
    name: craftify-api
    env: node
    region: oregon
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm run start:prod"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
