services:
  - type: web
    name: craftify-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm run start:prod"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: craftify-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: "*"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: AUTH_COOKIE_NAME
        value: craftify_access
      - key: REFRESH_COOKIE_NAME
        value: craftify_refresh
      - key: PAYMENT_PROVIDER
        value: mock
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: craftify-db
    plan: free
    databaseName: craftify
    region: oregon
